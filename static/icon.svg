<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- outer glow shadow -->
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#cabbe9" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- soft lavender halo -->
  <ellipse cx="50" cy="52" rx="44" ry="42" fill="#e8e0f7" opacity="0.55"/>

  <!-- star body -->
  <path d="M50 10 C50 10 60 34 74 36 C88 38 90 38 90 38 C90 38 72 50 74 64 C76 78 76 90 76 90 C76 90 62 76 50 76 C38 76 24 90 24 90 C24 90 24 78 26 64 C28 50 10 38 10 38 C10 38 12 38 26 36 C40 34 50 10 50 10 Z"
        fill="#f4a8d8" filter="url(#glow)"/>

  <!-- inner star highlight -->
  <path d="M50 18 C50 18 58 36 69 38 C80 40 82 40 82 40 C82 40 68 50 70 61 C72 72 72 82 72 82 C72 82 61 71 50 71 C39 71 28 82 28 82 C28 82 28 72 30 61 C32 50 18 40 18 40 C18 40 20 40 31 38 C42 36 50 18 50 18 Z"
        fill="#f7bce4" opacity="0.6"/>

  <!-- orbital ellipse ring -->
  <ellipse cx="50" cy="50" rx="38" ry="22" stroke="#b89fd8" stroke-width="1.8" fill="none" transform="rotate(-35 50 50)" opacity="0.85"/>

  <!-- cyan nodes at orbital intersections -->
  <circle cx="18" cy="38" r="5" fill="#a1eafb" stroke="#7ec8e3" stroke-width="1.2"/>
  <circle cx="82" cy="38" r="5" fill="#a1eafb" stroke="#7ec8e3" stroke-width="1.2"/>
  <circle cx="28" cy="72" r="5" fill="#a1eafb" stroke="#7ec8e3" stroke-width="1.2"/>
  <circle cx="72" cy="72" r="5" fill="#a1eafb" stroke="#7ec8e3" stroke-width="1.2"/>
  <!-- center node -->
  <circle cx="50" cy="50" r="5.5" fill="#a1eafb" stroke="#7ec8e3" stroke-width="1.2"/>

  <!-- star border -->
  <path d="M50 10 C50 10 60 34 74 36 C88 38 90 38 90 38 C90 38 72 50 74 64 C76 78 76 90 76 90 C76 90 62 76 50 76 C38 76 24 90 24 90 C24 90 24 78 26 64 C28 50 10 38 10 38 C10 38 12 38 26 36 C40 34 50 10 50 10 Z"
        fill="none" stroke="#9b7dc8" stroke-width="1.8"/>
</svg>
